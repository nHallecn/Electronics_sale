kind = "web"
previewPath = "/"
title = "Tech Brand Landing"
version = "1.0.0"
id = "artifacts/samsung-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23609

[services.development]
run = "pnpm --filter @workspace/samsung-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/samsung-clone", "run", "build" ]
publicDir = "artifacts/samsung-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23609"
BASE_PATH = "/"
